<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIシステム診断 - TaskMate</title>
    <meta name="description" content="30秒であなたの業務に最適な自動化システムをAIが診断します。">
    <link rel="icon" type="image/png" href="images/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100;300;400;500;700&family=Shippori+Mincho:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8faf9;
            --bg-deep: #eef2f0;
            --force: #2d8f5e;
            --force-light: #e8f5ee;
            --force-dim: #1d5f3d;
            --accent: #c17a3a;
            --accent-light: #fdf4eb;
            --border: rgba(45, 143, 94, 0.12);
            --text-main: #1a2b22;
            --text-mute: #5a6b62;
            --text-light: #7a8b82;
            --font-jp: 'Noto Sans JP', sans-serif;
            --shadow-soft: 0 4px 20px rgba(0, 0, 0, 0.06);
            --shadow-card: 0 2px 12px rgba(0, 0, 0, 0.04), 0 8px 30px rgba(0, 0, 0, 0.06);
        }
        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: var(--text-main);
            font-family: var(--font-jp);
            line-height: 1.7;
            min-height: 100vh;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--force) 0%, var(--force-dim) 100%);
            color: white;
            padding: 24px;
            text-align: center;
        }
        .header-title {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-size: 1.5rem;
            font-weight: 700;
        }
        .header-sub {
            margin-top: 8px;
            font-size: 0.9rem;
            opacity: 0.9;
        }
        .header-back {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: white;
            text-decoration: none;
            font-size: 0.9rem;
            opacity: 0.8;
        }
        .header-back:hover { opacity: 1; }
        .header-inner { position: relative; max-width: 900px; margin: 0 auto; }

        /* Progress */
        .ai-progress {
            margin-top: 16px;
            display: none;
        }
        .ai-progress.active { display: block; }
        .ai-progress-text {
            display: flex;
            justify-content: space-between;
            font-size: 0.875rem;
            margin-bottom: 8px;
        }
        .ai-progress-bar {
            height: 8px;
            background: rgba(255,255,255,0.2);
            border-radius: 4px;
            overflow: hidden;
        }
        .ai-progress-fill {
            height: 100%;
            background: white;
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        /* Main Content */
        .main {
            max-width: 900px;
            margin: 0 auto;
            padding: 32px 24px;
        }

        /* Loading */
        .ai-loading {
            text-align: center;
            padding: 64px 0;
        }
        .ai-spinner {
            display: inline-block;
            width: 64px;
            height: 64px;
            border: 4px solid var(--force-light);
            border-top-color: var(--force);
            border-radius: 50%;
            animation: ai-spin 1s linear infinite;
            margin-bottom: 16px;
        }
        @keyframes ai-spin { to { transform: rotate(360deg); } }
        @keyframes dotPulse {
            0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
            40% { opacity: 1; transform: scale(1); }
        }
        .ai-loading-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 8px;
        }
        .ai-loading-subtitle { color: var(--text-mute); }

        /* Question */
        .ai-question-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-main);
            text-align: center;
            margin-bottom: 32px;
        }
        .ai-options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 16px;
            max-width: 700px;
            margin: 0 auto;
        }
        .ai-option {
            padding: 24px;
            background: white;
            border: 2px solid rgba(0,0,0,0.06);
            border-radius: 12px;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s;
            font-family: var(--font-jp);
            font-size: 1rem;
        }
        .ai-option:hover {
            border-color: var(--force);
            background: var(--force-light);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(45,143,94,0.15);
        }
        .ai-option-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .ai-option-text {
            font-weight: 500;
            color: var(--text-main);
        }
        .ai-option:hover .ai-option-text { color: var(--force); }
        .ai-option-arrow { width: 20px; height: 20px; color: var(--text-light); }
        .ai-option:hover .ai-option-arrow { color: var(--force); }
        .ai-back-btn {
            display: block;
            margin: 32px auto 0;
            padding: 8px 16px;
            background: none;
            border: none;
            color: var(--text-mute);
            text-decoration: underline;
            cursor: pointer;
            font-family: var(--font-jp);
            font-size: 0.9rem;
        }
        .ai-back-btn:hover { color: var(--text-main); }

        /* Result */
        .ai-analysis {
            background: linear-gradient(135deg, var(--force-light) 0%, var(--accent-light) 100%);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 32px;
        }
        .ai-analysis-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 12px;
        }
        .ai-analysis-text {
            color: var(--text-main);
            line-height: 1.7;
            white-space: pre-line;
        }
        .ai-results-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 24px;
        }
        .ai-system-card {
            background: white;
            border: 2px solid rgba(0,0,0,0.06);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .ai-system-card:hover {
            border-color: var(--force);
            box-shadow: 0 8px 24px rgba(45,143,94,0.15);
            transform: translateY(-2px);
        }
        .ai-system-header {
            display: flex;
            align-items: start;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .ai-system-title-group {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }
        .ai-priority-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            background: var(--force);
            color: white;
            font-weight: 700;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .ai-system-name {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-main);
            margin: 0;
        }
        .ai-system-card:hover .ai-system-name { color: var(--force); }
        .ai-system-arrow {
            width: 24px;
            height: 24px;
            color: var(--text-light);
            flex-shrink: 0;
        }
        .ai-system-card:hover .ai-system-arrow { color: var(--force); }
        .ai-system-reason {
            color: var(--text-mute);
            line-height: 1.6;
            margin-bottom: 12px;
        }
        .ai-system-time {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--force);
        }
        .ai-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: center;
            margin-top: 32px;
        }
        .ai-action-btn {
            padding: 16px 32px;
            font-size: 1rem;
            font-weight: 700;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: var(--font-jp);
        }
        .ai-action-primary {
            background: var(--force);
            color: white;
        }
        .ai-action-primary:hover {
            background: var(--force-dim);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(45,143,94,0.3);
        }
        .ai-action-secondary {
            background: white;
            color: var(--force);
            border: 2px solid var(--force);
        }
        .ai-action-secondary:hover { background: var(--force-light); }

        /* Consultation CTA */
        .ai-consultation-cta {
            margin: 24px 0;
            padding: 20px;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            border-radius: 12px;
            text-align: center;
        }
        .ai-consultation-cta p:first-child {
            font-size: 1rem;
            color: #1e3a5f;
            margin-bottom: 12px;
            font-weight: 600;
        }
        .ai-consultation-cta .consult-btn {
            background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%);
            color: white;
            padding: 14px 28px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: var(--font-jp);
        }
        .ai-consultation-cta .consult-sub {
            font-size: 0.85rem;
            color: #64748b;
            margin-top: 8px;
        }

        /* Chat */
        .consultation-chat {
            display: flex;
            flex-direction: column;
            height: 60vh;
            max-height: 500px;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: var(--shadow-card);
        }
        #chatMessages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .chat-input-area {
            border-top: 1px solid #e2e8f0;
            padding: 12px 16px;
            display: flex;
            gap: 8px;
            background: #f8fafc;
        }
        .chat-input-area input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 0.95rem;
            outline: none;
            font-family: var(--font-jp);
        }
        .chat-input-area button {
            padding: 10px 20px;
            background: #0ea5e9;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            font-family: var(--font-jp);
        }
        .chat-back-area {
            padding: 12px 16px;
            text-align: center;
        }
        .chat-back-btn {
            padding: 8px 16px;
            background: transparent;
            color: #64748b;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-family: var(--font-jp);
        }

        /* Error */
        .ai-error {
            text-align: center;
            padding: 64px 24px;
        }
        .ai-error-icon { font-size: 4rem; margin-bottom: 16px; }
        .ai-error-message {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 24px;
        }

        /* Mobile */
        @media (max-width: 768px) {
            .header-title { font-size: 1.2rem; }
            .ai-question-title { font-size: 1.2rem; }
            .ai-options { grid-template-columns: 1fr; }
            .ai-option { padding: 16px; }
            .main { padding: 24px 16px; }
            .ai-system-name { font-size: 1.1rem; }
            .ai-results-title { font-size: 1.2rem; }
            .ai-actions { flex-direction: column; }
            .ai-action-btn { justify-content: center; }
            .header-back { position: static; display: block; text-align: left; margin-bottom: 8px; transform: none; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-inner">
            <a href="/" class="header-back">&larr; LPに戻る</a>
            <h1 class="header-title">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M11.017 2.814a1 1 0 0 1 1.966 0l1.051 5.558a2 2 0 0 0 1.594 1.594l5.558 1.051a1 1 0 0 1 0 1.966l-5.558 1.051a2 2 0 0 0-1.594 1.594l-1.051 5.558a1 1 0 0 1-1.966 0l-1.051-5.558a2 2 0 0 0-1.594-1.594l-5.558-1.051a1 1 0 0 1 0-1.966l5.558-1.051a2 2 0 0 0 1.594-1.594z"/>
                </svg>
                AIシステム診断
            </h1>
            <p class="header-sub">30秒であなたの業務に最適な自動化システムをAIが診断します</p>
            <div class="ai-progress" id="aiProgress">
                <div class="ai-progress-text">
                    <span id="aiProgressLabel">質問 1 / 5</span>
                    <span id="aiProgressPercent">20%</span>
                </div>
                <div class="ai-progress-bar">
                    <div class="ai-progress-fill" id="aiProgressFill" style="width: 20%;"></div>
                </div>
            </div>
        </div>
    </div>
    <div class="main" id="mainBody">
        <!-- Content dynamically inserted -->
    </div>

    <script>
    (function() {
        'use strict';

        var API_BASE = 'https://gasgenerator.onrender.com';

        var state = {
            step: 0,
            answers: [],
            questions: [],
            sessionId: '',
            recommendations: null,
            isLoading: false,
            error: null,
            lastResult: null
        };

        var mainBody = document.getElementById('mainBody');
        var progress = document.getElementById('aiProgress');
        var progressLabel = document.getElementById('aiProgressLabel');
        var progressPercent = document.getElementById('aiProgressPercent');
        var progressFill = document.getElementById('aiProgressFill');

        function resetState() {
            state.step = 0;
            state.answers = [];
            state.recommendations = null;
            state.error = null;
            renderStep();
        }

        function fetchQuestions() {
            state.isLoading = true;
            renderLoading();

            fetch(API_BASE + '/api/system-recommendation')
                .then(function(response) { return response.json(); })
                .then(function(data) {
                    if (data.success) {
                        state.questions = data.questions;
                        state.sessionId = data.sessionId;
                        state.isLoading = false;
                        renderStep();
                    } else {
                        throw new Error('質問の取得に失敗しました');
                    }
                })
                .catch(function(error) {
                    state.isLoading = false;
                    state.error = error.message || 'ネットワークエラーが発生しました';
                    renderError();
                });
        }

        function submitAnswers() {
            state.isLoading = true;
            renderLoading();

            fetch(API_BASE + '/api/system-recommendation', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    sessionId: state.sessionId,
                    answers: state.answers
                })
            })
                .then(function(response) { return response.json(); })
                .then(function(data) {
                    if (data.success) {
                        state.recommendations = data;
                        state.isLoading = false;
                        state.step = state.questions.length;
                        renderResult();
                    } else {
                        throw new Error('推薦の取得に失敗しました');
                    }
                })
                .catch(function(error) {
                    state.isLoading = false;
                    state.error = error.message || 'AIとの通信に失敗しました';
                    renderError();
                });
        }

        function handleAnswer(answer) {
            var question = state.questions[state.step];
            state.answers.push({
                questionId: question.id,
                answer: answer
            });

            if (state.step === state.questions.length - 1) {
                submitAnswers();
            } else {
                state.step++;
                renderStep();
            }
        }

        function handleBack() {
            if (state.step > 0) {
                state.step--;
                state.answers.pop();
                renderStep();
            }
        }

        function renderStep() {
            if (state.step >= state.questions.length) return;

            progress.classList.add('active');
            var question = state.questions[state.step];
            var progressValue = ((state.step + 1) / state.questions.length) * 100;

            progressLabel.textContent = '質問 ' + (state.step + 1) + ' / ' + state.questions.length;
            progressPercent.textContent = Math.round(progressValue) + '%';
            progressFill.style.width = progressValue + '%';

            var html = '<div class="ai-question-title">' + question.text + '</div>';
            html += '<div class="ai-options">';
            question.options.forEach(function(option) {
                html += '<button class="ai-option" data-answer="' + escapeHtml(option) + '">';
                html += '<div class="ai-option-content">';
                html += '<span class="ai-option-text">' + escapeHtml(option) + '</span>';
                html += '<svg class="ai-option-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>';
                html += '</div></button>';
            });
            html += '</div>';

            if (state.step > 0) {
                html += '<button class="ai-back-btn">&larr; 前の質問に戻る</button>';
            }

            mainBody.innerHTML = html;

            mainBody.querySelectorAll('.ai-option').forEach(function(option) {
                option.addEventListener('click', function() {
                    handleAnswer(this.getAttribute('data-answer'));
                });
            });

            var backBtn = mainBody.querySelector('.ai-back-btn');
            if (backBtn) backBtn.addEventListener('click', handleBack);
        }

        function renderLoading() {
            progress.classList.remove('active');
            mainBody.innerHTML = '<div class="ai-loading">' +
                '<div class="ai-spinner"></div>' +
                '<p class="ai-loading-title">AIが最適なシステムを分析中...</p>' +
                '<p class="ai-loading-subtitle">30〜45秒ほどお待ちください</p>' +
                '</div>';
        }

        function renderResult() {
            progress.classList.remove('active');
            var rec = state.recommendations;

            var html = '<div class="ai-analysis">';
            html += '<h3 class="ai-analysis-title">';
            html += '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11.017 2.814a1 1 0 0 1 1.966 0l1.051 5.558a2 2 0 0 0 1.594 1.594l5.558 1.051a1 1 0 0 1 0 1.966l-5.558 1.051a2 2 0 0 0-1.594 1.594l-1.051 5.558a1 1 0 0 1-1.966 0l-1.051-5.558a2 2 0 0 0-1.594-1.594l-5.558-1.051a1 1 0 0 1 0-1.966l5.558-1.051a2 2 0 0 0 1.594-1.594z"/></svg>';
            html += 'AI分析結果</h3>';
            html += '<p class="ai-analysis-text">' + escapeHtml(rec.analysisText) + '</p>';
            html += '</div>';

            html += '<h3 class="ai-results-title">おすすめのシステム（優先度順）</h3>';

            rec.recommendations.forEach(function(sys) {
                html += '<div class="ai-system-card" data-system-id="' + escapeHtml(sys.systemId) + '">';
                html += '<div class="ai-system-header">';
                html += '<div class="ai-system-title-group">';
                html += '<span class="ai-priority-badge">' + escapeHtml(sys.priority) + '</span>';
                html += '<h4 class="ai-system-name">' + escapeHtml(sys.systemName) + '</h4>';
                html += '</div>';
                html += '<svg class="ai-system-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>';
                html += '</div>';
                html += '<p class="ai-system-reason">' + escapeHtml(sys.reason) + '</p>';
                html += '<div class="ai-system-time">';
                html += '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>';
                html += '<span>推定削減時間: ' + escapeHtml(sys.estimatedTimeSaving) + '</span>';
                html += '</div></div>';
            });

            html += '<div class="ai-consultation-cta">';
            html += '<p>診断結果について、もっと詳しく知りたいですか？</p>';
            html += '<button class="consult-btn" id="startConsultationBtn">&#128172; AIに詳しく相談する（無料）</button>';
            html += '<p class="consult-sub">専門AIがあなたの業務課題を深掘りし、具体的なROI試算をお出しします</p>';
            html += '</div>';

            html += '<div class="ai-actions">';
            html += '<button class="ai-action-btn ai-action-primary" data-system-id="' + escapeHtml(rec.recommendations[0].systemId) + '">';
            html += '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>';
            html += '1位のシステムを詳しく見る</button>';
            html += '<button class="ai-action-btn ai-action-secondary" id="aiRestartBtn">もう一度診断する</button>';
            html += '</div>';

            state.lastResult = rec;
            mainBody.innerHTML = html;

            mainBody.querySelectorAll('.ai-system-card').forEach(function(card) {
                card.addEventListener('click', function() {
                    window.open('https://taskmateai.net/systems/catalog?id=' + this.getAttribute('data-system-id'), '_blank');
                });
            });

            var primaryBtn = mainBody.querySelector('.ai-action-primary');
            if (primaryBtn) {
                primaryBtn.addEventListener('click', function() {
                    window.open('https://taskmateai.net/systems/catalog?id=' + this.getAttribute('data-system-id'), '_blank');
                });
            }

            var restartBtn = document.getElementById('aiRestartBtn');
            if (restartBtn) restartBtn.addEventListener('click', resetState);

            var consultBtn = document.getElementById('startConsultationBtn');
            if (consultBtn) consultBtn.addEventListener('click', renderConsultationChat);
        }

        // ============================================================
        // Consultation Chat
        // ============================================================
        var consultationState = {
            sessionId: null,
            messages: [],
            diagnosisContext: null
        };

        function renderConsultationChat() {
            progress.classList.remove('active');

            var html = '<div class="consultation-chat">';
            html += '<div id="chatMessages"><div class="chat-loading" style="text-align:center;padding:20px;color:#64748b;">AIアシスタントを準備中...</div></div>';
            html += '<div class="chat-input-area">';
            html += '<input type="text" id="chatInput" placeholder="メッセージを入力..." maxlength="500" />';
            html += '<button id="chatSendBtn">送信</button>';
            html += '</div>';
            html += '</div>';
            html += '<div class="chat-back-area">';
            html += '<button class="chat-back-btn" id="backToResultBtn">&larr; 診断結果に戻る</button>';
            html += '</div>';

            mainBody.innerHTML = html;

            document.getElementById('chatSendBtn').addEventListener('click', sendChatMessage);
            document.getElementById('chatInput').addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendChatMessage();
                }
            });
            document.getElementById('backToResultBtn').addEventListener('click', renderResult);

            startConsultation();
        }

        function startConsultation() {
            var industryAnswer = state.answers.find(function(a) { return a.questionId === 1; });
            var challengeAnswer = state.answers.find(function(a) { return a.questionId === 2; });

            consultationState.diagnosisContext = {
                industry: industryAnswer ? industryAnswer.answer : '不明',
                challenge: challengeAnswer ? challengeAnswer.answer : '不明',
                recommendations: state.lastResult ? state.lastResult.recommendations : []
            };
            consultationState.sessionId = 'web_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            consultationState.messages = [];

            callConsultationAPI('開始');
        }

        function sendChatMessage() {
            var input = document.getElementById('chatInput');
            if (!input) return;
            var text = input.value.trim();
            if (!text) return;
            input.value = '';
            addChatBubble(text, 'user');
            callConsultationAPI(text);
        }

        function callConsultationAPI(message) {
            var sendBtn = document.getElementById('chatSendBtn');
            if (sendBtn) sendBtn.disabled = true;
            addChatBubble('...', 'assistant-loading');

            fetch(API_BASE + '/api/consultation-chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    sessionId: consultationState.sessionId,
                    message: message,
                    diagnosisContext: consultationState.diagnosisContext,
                    messages: consultationState.messages
                })
            })
            .then(function(res) { return res.json(); })
            .then(function(data) {
                var loading = document.querySelector('.assistant-loading');
                if (loading) loading.remove();
                if (data.success) {
                    addChatBubble(data.reply, 'assistant');
                    consultationState.messages.push({ role: 'user', content: message });
                    consultationState.messages.push({ role: 'assistant', content: data.reply });
                    if (data.reply.indexOf('timerex.net') !== -1) addBookingButton();
                } else {
                    addChatBubble('申し訳ありません。エラーが発生しました。', 'assistant');
                }
                if (sendBtn) sendBtn.disabled = false;
            })
            .catch(function() {
                var loading = document.querySelector('.assistant-loading');
                if (loading) loading.remove();
                addChatBubble('通信エラーが発生しました。もう一度お試しください。', 'assistant');
                if (sendBtn) sendBtn.disabled = false;
            });
        }

        function addChatBubble(text, type) {
            var container = document.getElementById('chatMessages');
            if (!container) return;
            var initialLoading = container.querySelector('.chat-loading');
            if (initialLoading) initialLoading.remove();

            var bubble = document.createElement('div');
            if (type === 'user') {
                bubble.style.cssText = 'align-self:flex-end;background:#0ea5e9;color:white;padding:10px 14px;border-radius:12px 12px 2px 12px;max-width:80%;font-size:0.95rem;line-height:1.5;';
                bubble.textContent = text;
            } else if (type === 'assistant-loading') {
                bubble.className = 'assistant-loading';
                bubble.style.cssText = 'align-self:flex-start;background:#f1f5f9;color:#64748b;padding:10px 14px;border-radius:12px 12px 12px 2px;max-width:80%;font-size:0.95rem;';
                bubble.innerHTML = '<span style="display:inline-flex;gap:4px;"><span style="animation:dotPulse 1.4s infinite ease-in-out both;animation-delay:0s;">&#9679;</span><span style="animation:dotPulse 1.4s infinite ease-in-out both;animation-delay:0.2s;">&#9679;</span><span style="animation:dotPulse 1.4s infinite ease-in-out both;animation-delay:0.4s;">&#9679;</span></span>';
            } else {
                bubble.style.cssText = 'align-self:flex-start;background:#f1f5f9;color:#1e293b;padding:10px 14px;border-radius:12px 12px 12px 2px;max-width:80%;font-size:0.95rem;line-height:1.5;';
                bubble.innerHTML = text.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" style="color:#0ea5e9;text-decoration:underline;">$1</a>');
            }
            container.appendChild(bubble);
            container.scrollTop = container.scrollHeight;
        }

        function addBookingButton() {
            var container = document.getElementById('chatMessages');
            if (!container) return;
            var btn = document.createElement('a');
            btn.href = 'https://timerex.net/s/cz1917903_47c5/7caf7949';
            btn.target = '_blank';
            btn.style.cssText = 'align-self:center;display:inline-block;margin:12px 0;padding:12px 24px;background:#2d8f5e;color:white;text-decoration:none;border-radius:8px;font-weight:600;text-align:center;';
            btn.textContent = '無料相談を予約する';
            container.appendChild(btn);
            container.scrollTop = container.scrollHeight;
        }

        function renderError() {
            progress.classList.remove('active');
            mainBody.innerHTML = '<div class="ai-error">' +
                '<div class="ai-error-icon">&#9888;&#65039;</div>' +
                '<p class="ai-error-message">' + escapeHtml(state.error || 'エラーが発生しました') + '</p>' +
                '<button class="ai-action-btn ai-action-primary" id="aiRetryBtn">もう一度試す</button>' +
                '</div>';

            var retryBtn = document.getElementById('aiRetryBtn');
            if (retryBtn) {
                retryBtn.addEventListener('click', function() {
                    state.error = null;
                    fetchQuestions();
                });
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        // Start
        fetchQuestions();
    })();
    </script>
</body>
</html>
