name: Sync system count

on:
  push:
    branches: [main]
    paths:
      - 'app/systems/catalog/page.tsx'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run sync script
        run: node scripts/sync-system-count.js

      - name: Commit and push if changed
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet && echo "No changes to commit" && echo "changed=false" >> $GITHUB_OUTPUT && exit 0
          git add lib/generated/system-count.ts public/lp-page.html netlify-tracking/frontend/index.html netlify-tracking/netlify/functions/admin-agencies.js
          git commit -m "chore: sync system count to $(grep -o '[0-9]*' lib/generated/system-count.ts)"
          git push
          echo "changed=true" >> $GITHUB_OUTPUT

      - name: Deploy to Netlify
        run: npx netlify-cli deploy --prod --no-build --dir=netlify-tracking/frontend --functions=netlify-tracking/netlify/functions
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
